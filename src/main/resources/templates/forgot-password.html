<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width:100%;max-width:400px;min-height:360px;">

        <h3 class="text-center mb-3">Forgot Password</h3>

        <!-- 説明 -->
        <p class="text-muted text-center small">
            Enter your email and we’ll send a reset link.
        </p>

        <form method="post" th:action="@{/forgot-password}">

            <!-- メール -->
            <input type="email"
                   name="email"
                   class="form-control mb-2"
                   placeholder="Email address"
                   required>

            <!-- 送信 -->
            <button class="btn btn-primary w-100" type="submit">
                Send Reset Link
            </button>

            <!-- メッセージ（共通化） -->
            <div th:if="${message}" th:text="${message}" class="alert alert-success mt-3 text-center">
            </div>

            <div th:if="${error}" th:text="${error}" class="alert alert-danger mt-3 text-center">
            </div>

        </form>

        <!-- 戻るリンク -->
        <div class="text-center mt-3">
            <a href="/login" class="text-decoration-none small">
                Back to Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
