<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width:100%;max-width:400px;min-height:350px;">

        <!-- エラー -->
        <div class="alert alert-danger text-center"
             th:if="${param.error}">
            Invalid username or password.
        </div>

        <!-- ログアウト -->
        <div class="alert alert-success text-center"
             th:if="${param.logout}">
            Logged out successfully.
        </div>

        <!-- 成功メッセージ -->
        <div th:if="${resetMessage}"
             class="alert alert-success">

            <span th:text="${resetMessage}"></span>

        </div>

        <h3 class="text-center">Login</h3>

        <form th:action="@{/login}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <input class="form-control mb-2" name="username"
                   placeholder="User Name" pattern="^[A-Za-z0-9_]+$"
                   title="Letters, numbers, and underscores only.">

            <div class="position-relative mb-2">
                <input id="password"
                       class="form-control pe-5"
                       type="password"
                       name="password"
                       placeholder="Password"
                       pattern="^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9!@#$%^&*()_+=\-{}\[\]:;'<>,.?/\\|`~]{8,}$"
                       title="Must be at least 8 characters and include letters and numbers.">

                <!-- 目アイコン -->
                <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                      data-target="password"
                      style="cursor:pointer;">
                    <i class="bi bi-eye" id="icon-password"></i>
                 </span>
            </div>

            <button class="btn btn-primary w-100">Login</button>

        </form>

        <p class="text-center mt-3 text-muted">User does not exist
            <a class="text-decoration-none text-primary"
               href="/register">Create Account</a></p>

        <div class="text-center">
            <p>If you forgot your password,
            <a class="text-decoration-none text-primary"
               href="/forgot-password">Forgot Password</a></p>
        </div>
    </div>
</div>
<script src="/js/password-toggle.js"></script>
</body>
</html>
