<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-light">
<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="d-flex justify-content-center align-items-center gap-1">
            <a class="btn btn-outline-primary btn-sm me-1"
               th:href="@{/attendance(
          year=${month == 1 ? year - 1 : year},
          month=${month == 1 ? 12 : month - 1}
          )}">
                <i class="bi bi-chevron-left"></i>
            </a>
            <h5 class="mb-0">
                <span th:text="${year}"></span>
                /
                <span th:text="${month}"></span>
            </h5>

            <a class="btn btn-outline-primary btn-sm ms-1"
               th:href="@{/attendance(
                  year=${month==12 ? year+1 : year},
                  month=${month==12 ?1:month+1}
                  )}">
                <i class="bi bi-chevron-right"></i>
            </a>
        </div>
        <div class="dropdown">
            <button class="btn d-flex align-items-center gap-2"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">

                <!-- アイコン-->
                <i class="bi bi-person-circle fs-4"></i>
                <!--名前-->
                <span class="fw-semibold" th:text="|${lastName} ${firstName}|"></span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li class="dropdown-item text-muted small">
                    Logged in as
                    <div th:text="${username}"></div>
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="dropdown-item text-danger">
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

    <!-- ボタン -->
    <div class="text-center mt-2">
        <button type="button"
                id="copyBtn"
                class="btn btn-outline-primary">
            <i class="bi bi-copy"></i>
            Copy
        </button>
        <button type="button"
                id="pasteBtn"
                class="btn btn-outline-success">
            <i class="bi bi-clipboard"></i>
            Paste
        </button>

        <button form="attendanceForm"
                class="btn btn-primary px-4">
            Save
        </button>
    </div>

    <!--成功メッセージ-->
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>
    </div>
    <!--エラーメッセージ-->
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>
    </div>
    <form id="attendanceForm" th:action="@{/attendance/save}" method="post">
        <!--現在月を保存-->
        <input type="hidden"
               name="year"
               th:value="${year}">
        <input type="hidden"
               name="month"
               th:value="${month}">

        <div class="table-wrapper">
            <table class="table table-attendance text-center align-middle">
                <!--列幅固定-->
                <colgroup>
                    <col style="width: 12%">
                    <col style="width: 12%">
                    <col style="width: 12%">
                    <col style="width: 10%">
                    <col style="width: 11%">
                    <col style="width: 11%">
                    <col style="width: 28%">

                </colgroup>
                <thead>
                <tr>
                    <th>Work Date</th>
                    <th>Start Time</th>
                    <th>End Time</th>
                    <th>Start Break</th>
                    <th>End Break</th>
                    <th>Work Hours</th>
                    <th>Note</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="row,i : ${rows}"
                    class="attendance-row"
                    th:classappend="${
                    holidaySet.contains(row.workDate) ? 'holiday ' :
                    (row.workDate.dayOfWeek.value == 6 ? 'sat ' : '') +
                    (row.workDate.dayOfWeek.value == 7 ? 'sun' : '')
                     }">
                    <!-- 日付 -->
                    <td>
                        <span th:text="${#temporals.format(row.workDate,'M/d(E)')}"></span>
                        <input type="hidden"
                               th:name="|rows[${i.index}].workDate|"
                               th:value="${row.workDate}">
                    </td>

                    <!--出勤-->
                    <td>
                        <input type="text"
                               class="form-control form-control-sm time-text"
                               maxlength="5"
                               inputmode="numeric"
                               placeholder="(00:00)"
                               th:name="|rows[${i.index}].startTime|"
                               th:value="${row.startTime}">
                        <!--エラー表示-->
                        <div class="invalid-feedback">
                            Invalid time format
                        </div>
                    </td>
                    <!--退勤-->
                    <td>
                        <input type="text"
                               class="form-control form-control-sm time-text"
                               maxlength="5"
                               inputmode="numeric"
                               placeholder="(00:00)"
                               th:name="|rows[${i.index}].endTime|"
                               th:value="${row.endTime}">
                        <!--エラー表示-->
                        <div class="invalid-feedback">
                            Invalid time format
                        </div>
                    </td>

                    <!--休憩開始-->
                    <td>
                        <input type="text"
                               class="form-control form-control-sm time-text"
                               maxlength="5"
                               inputmode="numeric"
                               placeholder="(00:00)"
                               th:name="|rows[${i.index}].breakStart|"
                               th:value="${row.breakStart}">
                        <!--エラー表示-->
                        <div class="invalid-feedback">
                            Invalid time format
                        </div>
                    </td>

                    <!--休憩終了-->
                    <td>
                        <input type="text"
                               class="form-control form-control-sm time-text"
                               maxlength="5"
                               inputmode="numeric"
                               placeholder="(00:00)"
                               th:name="|rows[${i.index}].breakEnd|"
                               th:value="${row.breakEnd}">
                        <!--エラー表示-->
                        <div class="invalid-feedback">
                            Invalid time format
                        </div>
                    </td>
                    <!--勤務時間-->
                    <td class="fw-semibold work-time"
                        th:text="${row.workTime} ?: '-'">
                    </td>

                    <!--備考-->
                    <td>
                        <input type="text" class="form-control form-control-sm"
                               th:name="|rows[${i.index}].note|"
                               th:value="${row.note}">
                    </td>
                </tr>
                </tbody>
                <tfoot>
                <tr class="table-secondary fw-bold">
                    <!--タイトル-->
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td class="text-center">
                        Total
                    </td>
                    <!--合計時間 -->
                    <td th:text="${totalWorkTime}">
                        00:00
                    </td>
                    <!--備考空-->
                    <td></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </form>
</div>
<!--Bootstrap-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!--勤怠自動計算 -->
<script src="/js/attendance.js"></script>
<!--Copy past-->
<script src="/js/attendance-copy.js"></script>
</body>
</html>
