<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width:100%;max-width:400px; min-height: 350px">

        <h3 class="text-center mb-3">Register</h3>

        <form th:action="@{/register}" th:object="${form}" method="post">

            <!-- ユーザー名 -->
            <input class="form-control mb-1"
                   th:field="*{username}"
                   placeholder="User Name"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
            <div class="text-danger" th:errors="*{username}"></div>

            <div class="form-group mb-1">
                <div class="position-relative">
                    <input id="password"
                           class="form-control pe-5"
                           type="password"
                           name="password"
                           placeholder="Password"
                           th:field="*{password}"
                           pattern="^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9!@#$%^&*()_+=\-{}\[\]:;'<>,.?/\\|`~]{8,}$"
                           title="Must be at least 8 characters and include letters and numbers.">

                    <!-- 目アイコン -->
                    <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                          data-target="password"
                          style="cursor:pointer;">
                    <i class="bi bi-eye" id="icon-password"></i>
                 </span>
                </div>
                <div class="invalid-feedback d-block" th:errors="*{password}"></div>
            </div>

            <!-- 確認パスワード（保持しない） -->
            <div class="form-group mb-1">
                <div class="position-relative">
                    <input id="confirmPassword"
                           class="form-control pe-5"
                           type="password"
                           th:field="*{confirmPassword}"
                           placeholder="Confirm Password">

                    <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                          data-target="confirmPassword"
                          style="cursor:pointer;">
                 <i class="bi bi-eye" id="icon-confirmPassword"></i>
                </span>
                </div>
                <div class="text-danger" th:errors="*{confirmPassword}"></div>
            </div>

            <!-- 名 -->
            <input class="form-control mb-1"
                   th:field="*{firstname}"
                   placeholder="First Name"
                   th:classappend="${#fields.hasErrors('firstname')} ? 'is-invalid'">
            <div class="text-danger" th:errors="*{firstname}"></div>

            <!-- 姓 -->
            <input class="form-control mb-1"
                   th:field="*{lastname}"
                   placeholder="Last Name"
                   th:classappend="${#fields.hasErrors('lastname')} ? 'is-invalid'">
            <div class="text-danger" th:errors="*{lastname}"></div>

            <input class="form-control mb-1"
                   th:field="*{email}"
                   placeholder="Email address"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
            <div class="text-danger" th:errors="*{email}"></div>

            <!-- 電話番号 -->
            <input class="form-control mb-1"
                   th:field="*{phone}"
                   placeholder="Phone Number"
                   th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'">
            <div class="text-danger" th:errors="*{phone}"></div>

            <!-- 誕生日 -->
            <label class="form-label">Date of Birth</label>
            <input class="form-control mb-1"
                   type="date"
                   th:field="*{birthday}"
                   th:classappend="${#fields.hasErrors('birthday')} ? 'is-invalid'">
            <div class="text-danger" th:errors="*{birthday}"></div>

            <button class="btn btn-primary w-100 mt-3">Register</button>
        </form>
        <div class="text-center mt-3">
            <a class="text-decoration-none text-primary" href="/login">
                Return Login
            </a>
        </div>

    </div>
</div>
<script src="/js/password-toggle.js"></script>
</body>
</html>
