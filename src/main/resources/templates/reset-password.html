<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow"
         style="width:100%;max-width:400px;min-height:350px;">
        <!-- フォーム -->
        <form method="post"
              th:action="@{/reset-password}">

            <!-- トークン -->
            <input type="hidden"
                   name="token"
                   th:value="${token}">

            <div class="form-group mb-3">
                <h5 class="mb-3">
                    Change Password
                </h5>
                <!-- エラーメッセージ -->
                <div th:if="${resetError}"
                     class="alert alert-danger">
                    <span th:text="${resetError}"></span>
                </div>
                <div class="position-relative">
                    <!-- パスワード -->
                    <input id="password"
                           class="form-control pe-5"
                           type="password"
                           name="password"
                           placeholder="New Password"
                           required
                           pattern="^(?=.*[A-Za-z])(?=.*[0-9])[A-Za-z0-9!@#$%^&*()_+=\-{}\[\]:;'<>,.?/\\|`~]{8,}$"
                           title="Must be at least 8 characters and include letters and numbers.">

                    <!-- 目アイコン -->
                    <span class="position-absolute top-50 end-0 translate-middle-y me-3 password-toggle"
                          data-target="password"
                          style="cursor:pointer;">

                        <i class="bi bi-eye"
                           id="icon-password"></i>
                    </span>
                </div>
                <!-- 説明 -->
                <small class="text-muted">
                    Must be at least 8 characters
                    and include letters and numbers.
                </small>
            </div>
            <!-- ボタン -->
            <button class="btn btn-primary w-100 mt-3">
                Change Password
            </button>
        </form>
    </div>
</div>
<!-- パスワード表示切替 -->
<script src="/js/password-toggle.js"></script>
</body>
</html>
